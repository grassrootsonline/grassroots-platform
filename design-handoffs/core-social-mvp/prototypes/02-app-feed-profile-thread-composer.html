<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grassroots — Feed · Profile · Thread · Composer (Amendment 02)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
/* ── TOKENS: colors ── */
:root {
  --color-ink:            #1C2B1A;
  --color-ink-soft:       #3D3D35;
  --color-accent:         #6B8C6A;
  --color-accent-subtle:  #D5E5D4;
  --color-accent-mist:    rgba(107, 140, 106, 0.12);
  --color-accent-ink:     #2E5C2C;
  --color-canvas:         #F7F6F4;
  --color-surface:        #FAFAF8;
  --color-border:         #E2DDD7;
  --color-border-strong:  #C5C0B8;
  --color-secondary:      #8A897F;
  --color-muted:          #A5A49A;
  --color-danger:         #C17A5A;
  --color-danger-subtle:  #F0EAE0;
  --color-warm:           #7A5C30;
  --color-warm-subtle:    #F0EAE0;
  --color-neutral:        #EAE7E1;
  --color-neutral-text:   #5A5950;

  /* ── TOKENS: typography ── */
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    'Courier New', Courier, monospace;
  --text-display: 36px; --text-title: 24px; --text-heading: 16px;
  --text-body: 14px; --text-small: 12px; --text-label: 11px;
  --leading-display: 1.1; --leading-title: 1.2;
  --leading-body: 1.65; --leading-tight: 1.3;
  --weight-regular: 400; --weight-medium: 500;
  --tracking-label: 0.08em; --tracking-tight: -0.01em;

  /* ── TOKENS: spacing ── */
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 20px; --space-xl: 32px; --space-2xl: 48px; --space-3xl: 72px;
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
  --radius-xl: 16px; --radius-pill: 999px;
  --border-default: 0.5px solid var(--color-border);
  --border-strong:  0.5px solid var(--color-border-strong);
  --border-accent:  0.5px solid var(--color-accent);
  --border-dashed:  0.5px dashed var(--color-border-strong);
  --focus-ring: 0 0 0 3px var(--color-accent-mist);
  --shadow-overlay: 0 4px 16px rgba(0,0,0,0.12);
  --feed-max-width: 640px; --sidebar-width: 188px;
  --z-sticky: 100; --z-overlay: 200; --z-modal: 300; --z-toast: 400;

  /* ── TOKENS: motion ── */
  --duration-fast:    120ms;
  --duration-base:    200ms;
  --duration-slow:    320ms;
  --ease-standard:    cubic-bezier(0.2, 0, 0, 1);
  --ease-enter:       cubic-bezier(0, 0, 0.2, 1);
  --ease-spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-colors: color var(--duration-fast) var(--ease-standard),
                        background-color var(--duration-fast) var(--ease-standard),
                        border-color var(--duration-fast) var(--ease-standard),
                        opacity var(--duration-fast) var(--ease-standard);
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-ink: #E8E6E1; --color-ink-soft: #C8C6C0;
    --color-accent: #8AAD89; --color-accent-subtle: #1E3020;
    --color-accent-mist: rgba(138,173,137,0.15); --color-accent-ink: #A9CBA8;
    --color-canvas: #141A13; --color-surface: #1A211A;
    --color-border: #2A3329; --color-border-strong: #3A4439;
    --color-secondary: #6E6E65; --color-muted: #4E4E47;
    --color-danger: #D4896A; --color-danger-subtle: #2A1F1A;
    --color-warm: #C9A878; --color-warm-subtle: #2A1F1A;
    --color-neutral: #2E2C28; --color-neutral-text: #9E9C94;
  }
}

@media (prefers-reduced-motion: reduce) {
  :root { --duration-fast: 0ms; --duration-base: 0ms; --duration-slow: 0ms; }
}

/* ── KEYFRAMES ── */
@keyframes gr-fade-in   { from{opacity:0}       to{opacity:1} }
@keyframes gr-scale-in  { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
@keyframes gr-slide-up  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: var(--leading-body);
  color: var(--color-ink);
  background: var(--color-canvas);
  -webkit-font-smoothing: antialiased;
}
body { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button, input, select, textarea { font: inherit; }
:focus-visible { outline: none; box-shadow: var(--focus-ring); }

/* ── LAYOUT ── */
.page     { width:100%; max-width:960px;  margin:0 auto; padding:0 20px; }
.page-wide{ width:100%; max-width:1080px; margin:0 auto; padding:0 20px; }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:var(--space-xs);
  font-family:var(--font-body); font-size:var(--text-body); font-weight:var(--weight-medium);
  line-height:1; border-radius:var(--radius-md); padding:8px 16px;
  cursor:pointer; border:none; outline:none; text-decoration:none; white-space:nowrap;
  transition:var(--transition-colors);
}
.btn:focus-visible { box-shadow: var(--focus-ring); }
.btn-primary   { background:var(--color-ink);     color:var(--color-canvas); }
.btn-primary:hover  { opacity:.88; }
.btn-primary:active { opacity:.76; }
.btn-secondary { background:transparent; color:var(--color-ink); border:var(--border-strong); }
.btn-secondary:hover  { background:var(--color-surface); }
.btn-secondary:active { opacity:.7; }
.btn-ghost { background:transparent; color:var(--color-accent); border:none; }
.btn-ghost:hover  { background:var(--color-accent-subtle); }
.btn-ghost:active { opacity:.7; }
.btn-danger { background:var(--color-danger); color:var(--color-canvas); border:none; }
.btn-danger:hover { opacity:.88; }
.btn-sm { font-size:var(--text-small); padding:5px 10px; border-radius:var(--radius-sm); }
.btn-lg { font-size:var(--text-heading); padding:12px 24px; border-radius:var(--radius-lg); }
.btn-icon { padding:7px; border-radius:var(--radius-md); }

/* ── AVATAR ── */
.avatar {
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:var(--radius-pill); font-weight:var(--weight-medium);
  background:var(--color-accent-subtle); color:var(--color-accent-ink);
  flex-shrink:0; overflow:hidden; user-select:none;
}
.avatar-sm { width:24px; height:24px; font-size:10px; }
.avatar-md { width:36px; height:36px; font-size:13px; }
.avatar-lg { width:48px; height:48px; font-size:16px; }
.avatar-xl { width:72px; height:72px; font-size:22px; }

/* ── BADGE ── */
.badge {
  display:inline-flex; align-items:center; gap:var(--space-xs);
  padding:3px 9px; border-radius:var(--radius-pill);
  font-size:var(--text-label); font-weight:var(--weight-medium);
  letter-spacing:var(--tracking-label); text-transform:uppercase; white-space:nowrap;
}
.badge-accent { background:var(--color-accent-subtle); color:var(--color-accent-ink); }

/* ── CARD ── */
.card {
  background:var(--color-surface);
  border:var(--border-default);
  border-radius:var(--radius-lg);
  padding:var(--space-lg) 20px;
}

/* ── FEED CARD ── */
.feed-card {
  background:var(--color-surface); border:var(--border-default);
  border-radius:var(--radius-lg); padding:var(--space-lg) 20px;
  transition:border-color var(--duration-fast) var(--ease-standard);
}
.feed-card:hover { border-color:var(--color-border-strong); }
.feed-card-header { display:flex; align-items:center; gap:var(--space-md); margin-bottom:var(--space-md); }
.feed-card-meta { flex:1; min-width:0; }
.feed-card-name {
  font-size:var(--text-body); font-weight:var(--weight-medium); color:var(--color-ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.feed-card-time { font-size:var(--text-small); color:var(--color-secondary); }
.feed-card-body {
  font-size:var(--text-body); line-height:var(--leading-body);
  color:var(--color-ink-soft); margin-bottom:var(--space-md);
}
.feed-card-actions {
  display:flex; gap:var(--space-lg); padding-top:var(--space-sm); border-top:var(--border-default);
}

/* ── ACTION BUTTON ── */
.action-btn {
  display:inline-flex; align-items:center; gap:4px;
  padding:0; font-family:var(--font-body); font-size:var(--text-small);
  color:var(--color-secondary); background:none; border:none; cursor:pointer;
  transition:color var(--duration-fast) var(--ease-standard);
}
.action-btn:hover  { color:var(--color-accent); }
.action-btn.active { color:var(--color-accent); }

/* ── INPUT ── */
.input {
  display:block; width:100%;
  font-family:var(--font-body); font-size:var(--text-body); color:var(--color-ink);
  background:var(--color-surface); border:var(--border-strong);
  border-radius:var(--radius-md); padding:8px 16px; outline:none;
  transition:border-color var(--duration-fast) var(--ease-standard),
             box-shadow var(--duration-fast) var(--ease-standard);
}
.input::placeholder { color:var(--color-muted); }
.input:hover  { border-color:var(--color-accent); }
.input:focus  { border-color:var(--color-accent); box-shadow:var(--focus-ring); }

/* ── BTN-ICON (composer footer) ── */
.btn-icon-tool {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px; padding:0; background:none; border:none;
  border-radius:var(--radius-md); cursor:pointer; color:var(--color-muted);
  transition:background var(--duration-fast) var(--ease-standard),
             color var(--duration-fast) var(--ease-standard);
}
.btn-icon-tool:hover { background:var(--color-accent-subtle); color:var(--color-accent-ink); }

/* ── NAVBAR ── */
.navbar {
  display:flex; align-items:center; justify-content:space-between;
  height:56px; background:var(--color-surface); border-bottom:var(--border-default);
  position:sticky; top:0; z-index:var(--z-sticky);
}

/* ── RAIL LINK ── */
.rail-link {
  display:flex; align-items:center; gap:12px; padding:8px 12px;
  border-radius:var(--radius-md); font-size:var(--text-body);
  color:var(--color-secondary); background:none; border:none;
  width:100%; text-align:left; cursor:pointer;
  transition:background var(--duration-fast) var(--ease-standard),
             color var(--duration-fast) var(--ease-standard);
  text-decoration:none;
}
.rail-link:hover { color:var(--color-ink); background:var(--color-surface); }
.rail-link.active { background:var(--color-accent-subtle); color:var(--color-ink); font-weight:var(--weight-medium); }
.rail-link.active i { color:var(--color-accent); }

/* ── PROFILE TABS ── */
.ptab {
  padding-bottom:12px; font-size:var(--text-body); color:var(--color-secondary);
  background:none; border:none; border-bottom:2px solid transparent;
  margin-bottom:-0.5px; cursor:pointer;
  transition:color var(--duration-fast) var(--ease-standard);
}
.ptab:hover { color:var(--color-ink); }
.ptab.active { color:var(--color-ink); font-weight:var(--weight-medium); border-bottom-color:var(--color-accent); }

/* ── NOTIFICATION ── */
.notif {
  display:flex; align-items:flex-start; gap:var(--space-md);
  padding:var(--space-md) var(--space-lg); border-radius:var(--radius-md);
  transition:background var(--duration-fast) var(--ease-standard);
}
.notif:hover { background:var(--color-surface); }
.notif-dot {
  width:7px; height:7px; border-radius:var(--radius-pill);
  background:var(--color-accent); margin-top:5px; flex-shrink:0;
}
.notif-dot.read { background:transparent; border:1.5px solid var(--color-border-strong); }
.notif-text { font-size:var(--text-body); color:var(--color-ink-soft); line-height:var(--leading-tight); }
.notif-time { font-size:var(--text-small); color:var(--color-muted); margin-top:var(--space-xs); }

/* ── TOAST ── */
.toast {
  display:inline-flex; align-items:center; gap:var(--space-md);
  padding:var(--space-md) var(--space-lg); background:var(--color-ink);
  color:var(--color-canvas); border-radius:var(--radius-lg);
  font-size:var(--text-body); box-shadow:var(--shadow-overlay);
  animation:gr-slide-up var(--duration-base) var(--ease-enter) both;
}

/* ── SEED BANNER ── */
.seed-banner {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:6px 0; background:var(--color-accent-mist);
  border-bottom:var(--border-accent); color:var(--color-accent);
  font-size:11px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase;
}

/* ── MODALS ── */
.modal-scrim {
  position:fixed; inset:0; background:rgba(28,43,26,0.32);
  z-index:var(--z-overlay);
}
.modal-panel {
  position:fixed; left:50%; transform:translateX(-50%);
  background:var(--color-surface); border-radius:var(--radius-xl);
  box-shadow:var(--shadow-overlay); z-index:var(--z-modal); overflow:hidden;
  animation:gr-scale-in var(--duration-slow) var(--ease-spring) both;
}

/* ── RIGHT RAIL RESPONSIVE ── */
@media (max-width:1279px) { .rightrail { display:none !important; } }

/* ── LNK ── */
.lnk { color:var(--color-secondary); transition:color var(--duration-fast) var(--ease-standard); cursor:pointer; }
.lnk:hover { color:var(--color-ink); }

/* ── DEV NAV ── */
.dev-nav-panel {
  background:var(--color-surface); border:var(--border-default);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-overlay);
  padding:6px; display:flex; flex-direction:column; gap:2px; min-width:160px;
  animation:gr-slide-up var(--duration-base) var(--ease-enter) both;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ── Seed data ── */
const INITIAL_POSTS = [
  { id:'p1', author:'Sarah Chen',     tag:'Inference Stack', time:'12m', content:"Just shipped batched inference for the open-source version. 3x throughput improvement on A100s. The key was fusing the attention masks before the kernel call — turned out 60% of our latency was masking overhead.", likes:47,  comments:8,  liked:false },
  { id:'p2', author:'Marcus Rivera',  tag:'AI Tooling',      time:'45m', content:'Hot take: most "AI agent frameworks" are just adding complexity around what should be a direct LLM call. The simplest architecture that works is the best architecture. Fight me.',                                 likes:112, comments:34, liked:true  },
  { id:'p3', author:'Priya Nair',     tag:'PromptKit',       time:'2h',  content:"PromptKit v0.4 is out. New features: structured output validation, automatic retry with exponential backoff, and a prompt playground that saves your history locally. Zero telemetry, MIT license.",               likes:89,  comments:12, liked:false },
  { id:'p4', author:'Leo Tanaka',     tag:'',                time:'5h',  content:"Spent the afternoon reading the new Gemini 2.0 technical report. The section on long-context retrieval is worth it alone — they're using a sparse attention pattern that degrades gracefully instead of falling off a cliff at context boundaries.", likes:61, comments:7, liked:false },
  { id:'p5', author:'Aisha Mohammed', tag:'DataForge',       time:'18h', content:"Six months in on DataForge and we just crossed 1,000 users. For a solo project with no marketing, that feels meaningful. Building in public works — every update post brought people I'd never have reached otherwise.", likes:203, comments:29, liked:false },
];

const INITIAL_REPLIES = [
  { id:'r1', author:'Marcus Rivera', time:'8m',   content:"This is exactly what I was waiting for. The batching approach you described sounds similar to what vLLM does — did you look at their paged attention impl?", likes:12 },
  { id:'r2', author:'Priya Nair',   time:'6m',   content:"The mask fusion trick is clever. We tried something similar but gave up because of numerical precision issues on bf16. Did you hit that?",               likes:5  },
  { id:'r3', author:'Leo Tanaka',   time:'3m',   content:"Open sourcing the benchmarks would help a lot. Love to see this on the standard evals.",                                                               likes:3  },
];

const TRENDING = [
  { name:'Inference Stack', key:'inference-stack', watchers:'842' },
  { name:'PromptKit',       key:'promptkit',       watchers:'631' },
  { name:'DataForge',       key:'dataforge',       watchers:'418' },
];

const WHO_TO_FOLLOW = [
  { name:'Oren Etzioni', key:'orenetz',    tagline:'AI researcher & builder' },
  { name:'Liang Chen',   key:'liangchen',  tagline:'Open-source LLM tools'   },
  { name:'Nadia Solvay', key:'nadiasolvay',tagline:'Multimodal & robotics'    },
];

const NOTIFS = [
  { id:'n1', actor:'Sarah Chen',   text:'liked your post about the inference stack.', time:'2m',  read:false },
  { id:'n2', actor:'Marcus Rivera',text:'started following you.',                     time:'14m', read:false },
  { id:'n3', actor:'Priya Nair',   text:'replied to your post.',                      time:'1h',  read:true  },
  { id:'n4', actor:'Leo Tanaka',   text:'is now following your project.',             time:'3h',  read:true  },
];

const PROFILE_PROJECTS = [
  { name:'Inference Stack', description:'High-throughput batched inference for open-source LLMs.', posts:12, collab:'3 collaborators' },
  { name:'PromptKit',       description:'Structured output, retries, and a local prompt playground.', posts:8, collab:'1 collaborator' },
];

const STATS = [
  { value:'1,284', label:'Users online',        icon:'ti ti-user'           },
  { value:'312',   label:'Active communities',  icon:'ti ti-users-group'    },
  { value:'4,927', label:'Ongoing threads',     icon:'ti ti-message-circle' },
];

const VALUE_PROPS = [
  { icon:'ti ti-pencil',        title:'Build openly',           body:'What you shipped, what you broke, what you learned, and what you imagine. Your journey, in one place.' },
  { icon:'ti ti-users-group',   title:'Build together',         body:'Create communities that follow the development of group projects and products. Talking to your audience has never been easier.' },
  { icon:'ti ti-message-circle',title:'Join the conversation',  body:'Your projects surface to the people most likely to care — not by algorithm, but by interest graph.' },
];

/* ── Helpers ── */
function initials(name) {
  return name.split(' ').map(w => w[0] || '').join('').slice(0,2).toUpperCase();
}

/* ── Sub-components ── */
function Avatar({ name='', size='md' }) {
  return <div className={`avatar avatar-${size}`}>{initials(name) || '?'}</div>;
}

function Btn({ variant='primary', size='', iconOnly=false, icon=null, onClick, disabled=false, children, style={} }) {
  const cls = ['btn', `btn-${variant}`, size && `btn-${size}`, iconOnly && 'btn-icon'].filter(Boolean).join(' ');
  return (
    <button className={cls} onClick={onClick} disabled={disabled} style={style}>
      {icon && <i className={`ti ti-${icon}`} aria-hidden="true" />}
      {!iconOnly && children}
    </button>
  );
}

function FeedCard({ post, onOpenThread, actions }) {
  return (
    <article className="feed-card">
      <div className="feed-card-header">
        <Avatar name={post.author} size="md" />
        <div className="feed-card-meta">
          <div className="feed-card-name">{post.author}</div>
          <div className="feed-card-time">
            {post.time}
            {post.tag && <> · <span style={{color:'var(--color-accent)'}}>{post.tag}</span></>}
          </div>
        </div>
      </div>
      <div className="feed-card-body">{post.content}</div>
      <div className="feed-card-actions">
        {actions.map((a, i) => (
          <button key={i} className={`action-btn${a.active ? ' active' : ''}`} onClick={a.onClick}>
            <i className={`ti ti-${a.icon}`} style={{fontSize:14}} aria-hidden="true" />
            {a.label}
          </button>
        ))}
      </div>
    </article>
  );
}

/* ── Navbar ── */
function Navbar({ onBell, onAvatar }) {
  return (
    <header className="navbar">
      <div className="page-wide" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:'100%'}}>
        <span style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--color-ink)',cursor:'default'}}>Grassroots</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Btn variant="ghost" iconOnly icon="bell" onClick={onBell} />
          <span style={{cursor:'pointer'}} onClick={onAvatar}><Avatar name="Alex Kim" size="sm" /></span>
        </div>
      </div>
    </header>
  );
}

/* ── Left rail ── */
function LeftRail({ view, onFeed, onProfile }) {
  const items = [
    { icon:'home',     label:'Feed',        key:'feed',    action: onFeed    },
    { icon:'compass',  label:'Explore',     key:'explore', action: ()=>{} },
    { icon:'folder',   label:'Projects',    key:'projects',action: ()=>{} },
    { icon:'users',    label:'Communities', key:'communities',action:()=>{} },
    { icon:'bookmark', label:'Saved',       key:'saved',   action: ()=>{} },
  ];
  return (
    <aside style={{width:188,flexShrink:0,position:'sticky',top:80,alignSelf:'flex-start',minHeight:'calc(100vh - 120px)',display:'flex',flexDirection:'column'}}>
      <nav style={{display:'flex',flexDirection:'column',gap:2}}>
        {items.map(it => (
          <button key={it.key} className={`rail-link${view === it.key ? ' active' : ''}`} onClick={it.action}>
            <i className={`ti ti-${it.icon}`} style={{fontSize:18}} aria-hidden="true" />
            {it.label}
          </button>
        ))}
      </nav>
      <div style={{marginTop:20}}>

function ThreadScreen({ post, replies, onBack, onAddReply }) {
  const [draft, setDraft] = useState('');
  const replyLikes = useRef({});

    replyLikes.current[id] = (replyLikes.current[id] || 0) + 1;
    rerender(n => n+1);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }

  function submit() {
    if (!draft.trim()) return;

  const actions = [

                  <span style={{fontSize:14,fontWeight:500,color:'var(--color-ink)'}}>{r.author}</span>
                  <span style={{fontSize:13,color:'var(--color-secondary)'}}>·</span>
                  <span style={{fontSize:13,color:'var(--color-secondary)'}}>{r.time}</span>
                </div>
                <p style={{fontSize:14,color:'var(--color-ink-soft)',lineHeight:1.65}}>{r.content}</p>
                <div style={{display:'flex',alignItems:'center',gap:16,marginTop:10}}>
                  <button className="action-btn" onClick={() => likeReply(r.id)}>
                    <i className="ti ti-heart" style={{fontSize:14}} aria-hidden="true" />
                    <span>{r.likes + (replyLikes.current[r.id] || 0)}</span>
                  </button>
                  <button className="action-btn">Reply</button>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginTop:20}}>
          <Avatar name="Alex Kim" size="md" />
          <input
            type="text"
            placeholder="Write a reply…"
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={handleKey}
            className="input"
            style={{flex:1,height:36,borderRadius:999,background:'var(--color-canvas)'}}
          />
          <Btn variant="primary" size="sm" onClick={submit}>Reply</Btn>
        </div>
      </div>
    </main>
  );
}

/* ── ROOT APP ── */
function App() {
  const [view, setView]       = useState('landing');
  const [threadId, setThreadId] = useState('p1');
  const [posts, setPosts]     = useState(INITIAL_POSTS);
  const [replies, setReplies] = useState(INITIAL_REPLIES);
  const [following, setFollowing] = useState({});
  const [composerOpen, setComposerOpen] = useState(false);
  const [authMode, setAuthMode] = useState('signup');
  const [authOpen, setAuthOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [toast, setToast]     = useState(null);
  const toastTimer = useRef(null);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  }

  function toggleLike(id) {
    setPosts(ps => ps.map(p => p.id === id ? { ...p, liked: !p.liked, likes: p.likes + (p.liked ? -1 : 1) } : p));
  }

  function toggleFollow(key) {
    setFollowing(f => ({ ...f, [key]: !f[key] }));
  }

  function openThread(id) {
    setThreadId(id);
    setView('thread');
    setNotifOpen(false);
  }

  function handlePublish(text, project) {
    const post = { id:'n'+Date.now(), author:'Alex Kim', tag:project, time:'just now', content:text, likes:0, comments:0, liked:false };
    setPosts(ps => [post, ...ps]);
    setComposerOpen(false);
    setView('feed');
    showToast('Post published.');
  }

  function handleAddReply(text) {
    setReplies(rs => [...rs, { id:'r'+Date.now(), author:'Alex Kim', time:'just now', content:text, likes:0 }]);
    showToast('Reply posted.');
  }

  function handleAuthSubmit() {
    setAuthOpen(false);
    setView('feed');
    showToast(authMode === 'signup' ? 'Account created.' : 'Logged in.');
  }

  const threadPost = posts.find(p => p.id === threadId) || posts[0];
  const isPlatform = view !== 'landing';

  return (
    <div style={{minHeight:'100vh',background:'var(--color-canvas)'}}>
      {/* LANDING */}
      {view === 'landing' && (
        <LandingScreen
          onLogin={() => { setAuthMode('login'); setAuthOpen(true); }}
          onSignup={() => { setAuthMode('signup'); setAuthOpen(true); }}
        />
      )}

      {/* PLATFORM */}
      {isPlatform && (
        <div>
          {/* Notifications click-outside */}
          {notifOpen && <div style={{position:'fixed',inset:0,zIndex:150}} onClick={() => setNotifOpen(false)} />}

          <Navbar
            onBell={() => setNotifOpen(v => !v)}
            onAvatar={() => { setView('profile'); setNotifOpen(false); }}
          />

          {/* Notif panel */}
          {notifOpen && (
            <div style={{position:'fixed',top:56,right:20,zIndex:'var(--z-overlay)'}}>
              <NotifPanel onClose={() => setNotifOpen(false)} />
            </div>
          )}

          {/* Seed banner */}
          <div className="seed-banner">
            <i className="ti ti-database" style={{fontSize:13}} aria-hidden="true" /> Development build · seeded data
          </div>

          <div className="page-wide" style={{paddingTop:20}}>
            <div style={{display:'flex',gap:24,alignItems:'flex-start'}}>
              <LeftRail
                view={view}
                onFeed={() => setView('feed')}
                onProfile={() => { setView('profile'); setNotifOpen(false); }}
              />

              {view === 'feed' && (
                <>
                  <FeedScreen
                    posts={posts}
                    following={following}
                    onToggleLike={toggleLike}
                    onOpenThread={openThread}
                    onFollow={toggleFollow}
                    onOpenComposer={() => setComposerOpen(true)}
                  />
                  <RightRail
                    trending={TRENDING}
                    whoToFollow={WHO_TO_FOLLOW}
                    following={following}
                    onFollow={toggleFollow}
                  />
                </>
              )}

              {view === 'profile' && (
                <ProfileScreen
                  posts={posts}
                  onBack={() => setView('feed')}
                  onOpenThread={openThread}
                />
              )}

              {view === 'thread' && (
                <ThreadScreen
                  post={threadPost}
                  replies={replies}
                  onBack={() => setView('feed')}
                  onAddReply={handleAddReply}
                />
              )}
            </div>
          </div>
        </div>
      )}

      {/* COMPOSER */}
      {composerOpen && <ComposerModal onClose={() => setComposerOpen(false)} onPublish={handlePublish} />}

      {/* AUTH */}
      {authOpen && (
        <AuthModal
          mode={authMode}
          onClose={() => setAuthOpen(false)}
          onSubmit={handleAuthSubmit}
          onSwitch={() => setAuthMode(m => m === 'signup' ? 'login' : 'signup')}
        />
      )}

      {/* TOAST */}
      <Toast msg={toast} />

      {/* DEV NAV */}
      <DevNav view={view} onNavigate={v => { setView(v); if (v==='thread') setThreadId('p1'); }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
